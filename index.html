        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

        .banner{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);border-radius:10px;padding:12px 14px;margin-bottom:20px;display:flex;align-items:center;gap:10px}

        .btn-banner{background:var(--gold);color:#000;border:none;padding:7px 12px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}

        .s-yellow .stat-num{color:var(--yellow)}

const DAYS=40, SOON=7;
const LS_DATA='pl_v3', LS_CFG='pl_gh_cfg', LS_SHA='pl_gh_sha';
const GH_OWNER='eliav951536-dot', GH_REPO='platinum-laser-data';

// ── GitHub API ──
function cfg(){ try{return JSON.parse(localStorage.getItem(LS_CFG)||'null')}catch{return null} }
function ok(){ const c=cfg(); return !!(c?.token) }
function ghH(token){ return {'Authorization':`Bearer ${token}`,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'} }

async function ghRead(){
    const c=cfg(); if(!c) return null;
    const r=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/customers.json`,{headers:ghH(c.token)});
    if(!r.ok){console.error('ghRead',r.status);return null}
    const j=await r.json();
    localStorage.setItem(LS_SHA,j.sha);
    return JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g,'')))));
}

async function ghWrite(arr){
    const c=cfg(); if(!c) return;
    const sha=localStorage.getItem(LS_SHA);
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(arr,null,2))));
    const body=JSON.stringify({message:'update',content,...(sha?{sha}:{})});
    const r=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/customers.json`,
        {method:'PUT',headers:{...ghH(c.token),'Content-Type':'application/json'},body});
    if(!r.ok){console.error('ghWrite',r.status,await r.text());return}
    const j=await r.json();
    localStorage.setItem(LS_SHA,j.content.sha);
}

// ── Data ──
let data=[];
function saveLocal(d){ localStorage.setItem(LS_DATA,JSON.stringify(d)) }
function loadLocal(){ try{return JSON.parse(localStorage.getItem(LS_DATA)||'[]')}catch{return[]} }

async function loadData(){
    if(ok()){
        const rows=await ghRead();
        if(rows){data=rows;saveLocal(data);setLbl('מסונכרן עם GitHub ☁️');document.getElementById('banner').style.display='none';return}
    }
    data=loadLocal();
    setLbl('מקומי (ללא סנכרון)');
    if(!ok()) document.getElementById('banner').style.display='flex';
}

async function persist(){
    saveLocal(data);
    if(ok()) ghWrite(data).catch(console.error); // async, don't block UI
}

// ── Utils ──
const today=()=>new Date().toISOString().split('T')[0];
function daysSince(d){
    if(!d)return null;
    const a=new Date(d),b=new Date();
    a.setHours(0,0,0,0);b.setHours(0,0,0,0);
    return Math.floor((b-a)/86400000);
}
function phoneClean(p){if(!p)return'';let n=p.replace(/\D/g,'');if(n.length===9)n='0'+n;return n.replace(/^0/,'972')}
function waLink(c){
    const m=`היי ${c.name}, מה שלומך?\nראיתי שעבר קצת זמן מהטיפול האחרון שלך בלייזר.${c.area?' ('+c.area+')':''}\n\nכדי לשמור על ההתקדמות ולהגיע לתוצאה טובה, חשוב לא לפתוח פער גדול מדי בין הטיפולים.\nרוצה שאקבע לך תור להמשך הסדרה?`;
    return`https://wa.me/${phoneClean(c.phone)}?text=${encodeURIComponent(m)}`;
}
function setLbl(t){document.getElementById('sync-lbl').textContent=t}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2800)}

// ── Actions ──
async function markTreated(id){
    const c=data.find(x=>x.id===id);if(!c)return;
    c.lastTreatment=today();await persist();
    toast(`✅ ${c.name} — טיפול נרשם`);render();
}
async function delCustomer(id){
    const c=data.find(x=>x.id===id);
    if(!confirm(`למחוק את ${c?.name}?`))return;
    data=data.filter(x=>x.id!==id);await persist();render();
}

// ── Modals ──
let curTab='all';
function ooc(e,id){if(e.target.id===id)close(id)}
function close(id){document.getElementById(id).classList.remove('open')}

function openAdd(){
    document.getElementById('mo-title').textContent='לקוח חדש';
    document.getElementById('f-id').value='';
    document.getElementById('f-name').value='';
    document.getElementById('f-phone').value='';
    document.getElementById('f-area').value='';
    document.getElementById('f-date').value=today();
    document.getElementById('f-notes').value='';
    document.getElementById('mo').classList.add('open');
    setTimeout(()=>document.getElementById('f-name').focus(),200);
}
function openEdit(id){
    const c=data.find(x=>x.id===id);if(!c)return;
    document.getElementById('mo-title').textContent='עריכת לקוח';
    document.getElementById('f-id').value=c.id;
    document.getElementById('f-name').value=c.name;
    document.getElementById('f-phone').value=c.phone||'';
    document.getElementById('f-area').value=c.area||'';
    document.getElementById('f-date').value=c.lastTreatment||'';
    document.getElementById('f-notes').value=c.notes||'';
    document.getElementById('mo').classList.add('open');
}
async function save(){
    const id=document.getElementById('f-id').value;
    const name=document.getElementById('f-name').value.trim();
    const phone=document.getElementById('f-phone').value.trim();
    const area=document.getElementById('f-area').value.trim();
    const date=document.getElementById('f-date').value;
    const notes=document.getElementById('f-notes').value.trim();
    if(!name){alert('יש להכניס שם');return}
    if(id){const c=data.find(x=>x.id===id);if(c)Object.assign(c,{name,phone,area,lastTreatment:date||null,notes})}
    else data.push({id:Date.now().toString(),name,phone,area,lastTreatment:date||null,notes});
    await persist();close('mo');toast(`✅ ${name} נשמר`);render();
}

// ── Settings ──
function openSettings(){
    document.getElementById('s-token').value=cfg()?.token||'';
    updSS();
    document.getElementById('so').classList.add('open');
}
function updSS(){
    const el=document.getElementById('ss-status');
    if(ok()){el.className='ss-bar ok';el.textContent='🟢 מחובר ל-GitHub — נתונים מסונכרנים'}
    else{el.className='ss-bar no';el.textContent='⚪ לא מחובר — נתונים שמורים מקומית בלבד'}
}
async function saveSets(){
    const token=document.getElementById('s-token').value.trim();
    if(!token){alert('יש להכניס GitHub Token');return}
    localStorage.setItem(LS_CFG,JSON.stringify({token}));
    close('so');toast('מחבר ל-GitHub...');
    const existing=await ghRead();
    if(!existing||!existing.length){await ghWrite(data);toast(`☁️ ${data.length} לקוחות הועלו`)}
    await loadData();render();
}
function clearSets(){
    if(!confirm('לנתק מ-GitHub?'))return;
    localStorage.removeItem(LS_CFG);localStorage.removeItem(LS_SHA);
    setLbl('מקומי');document.getElementById('banner').style.display='flex';
    toast('נותק');updSS();
}

// ── Tabs ──
function setTab(t){
    curTab=t;
    ['all','urgent','ok'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('active',x===t));
    render();
}

// ── Render ──
function cardHTML(c){
    const d=daysSince(c.lastTreatment);
    let urg=false,soon=false,stC,stT,avC;
    if(d===null){stC='st-none';stT='טרם נרשם טיפול';avC='av-none'}
    else if(d>=DAYS){urg=true;stC='st-urgent';stT=`⚠️ ${d} ימים מהטיפול האחרון`;avC='av-urgent'}
    else if(d>=DAYS-SOON){soon=true;stC='st-soon';stT=`עוד ${DAYS-d} ימים להודעה`;avC='av-soon'}
    else{stC='st-ok';stT=`עוד ${DAYS-d} ימים`;avC='av-ok'}
    const hp=c.phone?.trim();
    const waBtn=urg?(hp?`<a href="${waLink(c)}" target="_blank" class="btn-wa" onclick="toast('ווטסאפ נפתח 📱')">📱</a>`:'<span class="no-phone">אין טלפון</span>'):'';
    return`<div class="card${urg?' urgent':soon?' soon':''}">
        <div class="avatar ${avC}">${c.name.slice(0,1)}</div>
        <div class="card-info" onclick="openEdit('${c.id}')">
            <div class="card-name">${c.name}</div>
            ${c.area?`<div class="card-area">📍 ${c.area}</div>`:''}
            <div class="card-status ${stC}">${stT}</div>
        </div>
        <div class="card-actions">
            ${waBtn}
            <button class="btn-treated" onclick="markTreated('${c.id}')">✓ טופל</button>
            <button class="btn-del"     onclick="delCustomer('${c.id}')">×</button>
        </div>
    </div>`;
}

function render(){
    const q=(document.getElementById('q').value||'').toLowerCase();
    let f=data.filter(c=>c.name.includes(q)||(c.area||'').includes(q));
    const urg=[],rest=[];
    f.forEach(c=>{const d=daysSince(c.lastTreatment);(d!==null&&d>=DAYS?urg:rest).push({...c,_d:d})});
    urg.sort((a,b)=>b._d-a._d);
    rest.sort((a,b)=>{if(a._d===null)return 1;if(b._d===null)return-1;return b._d-a._d});
    const soonN=rest.filter(c=>c._d!==null&&c._d>=DAYS-SOON).length;
    document.getElementById('st-urg').textContent=urg.length;
    document.getElementById('st-tot').textContent=data.length;
    document.getElementById('st-soon').textContent=soonN;
    let items=curTab==='urgent'?urg:curTab==='ok'?rest:[...urg,...rest];
    document.getElementById('list').innerHTML=items.length
        ?items.map(cardHTML).join('')
        :`<div class="empty"><div class="empty-icon">${curTab==='urgent'?'✅':'👤'}</div>${curTab==='urgent'?'אין לקוחות שצריכים הודעה':'לא נמצאו לקוחות'}</div>`;
}

// ── Init ──
document.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&document.getElementById('mo').classList.contains('open'))save();
    if(e.key==='Escape'){close('mo');close('so')}
});

// Auto-config from URL hash
(function(){
    const h=window.location.hash;
    if(h.startsWith('#cfg=')){
        try{
            const c=JSON.parse(atob(h.slice(5)));
            if(c.t){localStorage.setItem(LS_CFG,JSON.stringify({token:c.t}));history.replaceState(null,'',location.pathname)}
        }catch(e){console.error('hash cfg err',e)}
    }
})();

(async()=>{
    if(!localStorage.getItem(LS_DATA)){data=SEED.map(c=>({...c}));saveLocal(data)}
    await loadData();render();
})();
</script>
